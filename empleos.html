<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentMatch - Empleos Disponibles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="flex items-center justify-between p-6 bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <h2 class="text-2xl font-extrabold text-indigo-700 cursor-pointer tracking-tight" onclick="irAInicio()">TalentMatch</h2>
        
        <div class="relative">
            <div onclick="toggleMenu()" class="w-11 h-11 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold cursor-pointer hover:bg-indigo-700 transition shadow-md select-none">
                JD
            </div>
            
            <div id="profile-menu" class="absolute right-0 mt-3 bg-white shadow-2xl rounded-2xl p-2 w-56 border border-slate-100 hidden z-50">
                <div class="px-4 py-3 border-b border-slate-100 mb-2">
                    <p class="text-sm font-extrabold text-slate-800">Juan Doe</p>
                    <p class="text-xs text-slate-500 truncate">juan.doe@email.com</p>
                </div>
                <button onclick="irAPerfil()" class="block text-sm text-left w-full px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition font-medium">Datos Personales</button>
                <button class="block text-sm text-left w-full px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition font-medium">Mi Currículum</button>
                <button class="block text-sm text-left w-full px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition font-medium">Mis Postulaciones</button>
                <button class="block text-sm text-left w-full px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition font-medium">Configuración</button>
                <div class="h-px bg-slate-100 my-1"></div>
                <button onclick="cerrarSesion()" class="block text-sm text-left w-full px-4 py-2.5 rounded-xl text-red-600 font-bold hover:bg-red-50 transition">Salir</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-10">
        <h1 class="text-4xl font-extrabold text-center mb-8 text-slate-800">Empleos disponibles</h1>
        
        <div class="flex flex-col items-center gap-6 mb-12">
            <input type="text" id="searchInput" placeholder="Buscar empleo, empresa o rol..." onkeyup="filtrarPorTexto()" class="px-6 py-4 rounded-2xl border border-slate-200 w-full max-w-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-700">
            
            <div class="flex flex-wrap justify-center gap-3" id="filterButtons">
                <button onclick="aplicarFiltro('Todos', this)" class="filtro-btn px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-md transition">Todos</button>
                <button onclick="aplicarFiltro('Remoto', this)" class="filtro-btn px-6 py-2 rounded-xl font-bold bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 transition">Remoto</button>
                <button onclick="aplicarFiltro('Híbrido', this)" class="filtro-btn px-6 py-2 rounded-xl font-bold bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 transition">Híbrido</button>
                <button onclick="aplicarFiltro('Presencial', this)" class="filtro-btn px-6 py-2 rounded-xl font-bold bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 transition">Presencial</button>
            </div>
        </div>

        <div id="jobList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script src="empleos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
