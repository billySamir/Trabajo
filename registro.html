<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentMatch - Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans">

    <header class="w-full py-6 px-8 absolute top-0 left-0 z-20">
        <div class="text-2xl font-extrabold tracking-tight text-white cursor-pointer" onclick="irAInicio()">
            Talent<span class="text-indigo-400">Match</span>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center p-6 bg-hero relative">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 relative z-10">
            <h2 class="text-3xl font-extrabold mb-8 text-center text-slate-800 tracking-tight">Crea tu cuenta</h2>

            <div class="flex flex-col gap-4 mb-6">
                <input id="nameInput" type="text" placeholder="Nombre completo" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-slate-700 bg-slate-50">
                <input id="emailInput" type="email" placeholder="Correo electrónico" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-slate-700 bg-slate-50">
                <div class="relative">
                    <input id="passwordInput" type="password" placeholder="Contraseña" class="w-full p-4 pr-12 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-slate-700 bg-slate-50">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-slate-700">
                        <svg id="passwordEyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button onclick="registrarCuenta()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold mb-4 hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-600/30 transition duration-300">
                Crear cuenta
            </button>

            <p id="auth-message" class="text-sm text-center text-slate-500 mb-6"></p>

            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-sm text-slate-400 font-medium">O continuar con</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <div class="flex gap-4 mb-8">
                <button onclick="iniciarSesionSocial('Google')" class="flex-1 py-3 px-4 bg-white border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition shadow-sm">
                    <span class="font-semibold text-slate-700">Google</span>
                </button>
                <button onclick="iniciarSesionSocial('GitHub')" class="flex-1 py-3 px-4 bg-white border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition shadow-sm">
                    <span class="font-semibold text-slate-700">GitHub</span>
                </button>
            </div>

            <p class="text-center text-slate-500 text-sm">
                ¿Ya tienes cuenta? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Inicia sesión</a>
            </p>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="registro.js"></script>
</body>
</html>
