<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentMatch - Iniciar Sesión</title>
    <!-- Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Hoja de estilos compartida -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans">

    <!-- Navegación Superior -->
    <header class="w-full py-6 px-8 absolute top-0 left-0 z-20">
        <div class="text-2xl font-extrabold tracking-tight text-white cursor-pointer" onclick="irAInicio()">
            Talent<span class="text-indigo-400">Match</span>
        </div>
    </header>

    <!-- Contenedor Principal (Fondo e interfaz de login) -->
    <main class="min-h-screen flex items-center justify-center p-6 bg-hero relative">
        <!-- Overlay oscuro para resaltar la tarjeta -->
        <div class="absolute inset-0 bg-black/60"></div>
        
        <!-- Tarjeta de Login -->
        <div class="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 relative z-10">
            <h2 class="text-3xl font-extrabold mb-8 text-center text-slate-800 tracking-tight">Bienvenido</h2>
            
            <!-- Formulario Tradicional -->
            <div class="flex flex-col gap-4 mb-6">
                <input id="emailInput" type="email" placeholder="Correo electrónico" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-slate-700 bg-slate-50">
                <input id="passwordInput" type="password" placeholder="Contraseña" class="w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-slate-700 bg-slate-50">
            </div>
            
            <button onclick="iniciarSesion()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold mb-4 hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-600/30 transition duration-300">
                Iniciar Sesión
            </button>

            <p id="auth-message" class="text-sm text-center text-slate-500 mb-6"></p>
            
            <!-- Separador -->
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-sm text-slate-400 font-medium">O continuar con</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <!-- Botones Sociales -->
            <div class="flex gap-4 mb-8">
                <!-- Botón de Google -->
                <button onclick="iniciarSesionSocial('Google')" class="flex-1 py-3 px-4 bg-white border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition shadow-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="font-semibold text-slate-700">Google</span>
                </button>
                
                <!-- Botón de GitHub -->
                <button onclick="iniciarSesionSocial('GitHub')" class="flex-1 py-3 px-4 bg-white border border-slate-200 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 transition shadow-sm">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                    </svg>
                    <span class="font-semibold text-slate-700">GitHub</span>
                </button>
            </div>
            
            <p class="text-center text-slate-500 text-sm">
                ¿No tienes cuenta? <a href="#" class="text-indigo-600 font-bold hover:underline">Regístrate</a>
            </p>
        </div>
    </main>

    <!-- Lógica de la página -->
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
